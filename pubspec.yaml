name: trickle
description: "A fast, client-only podcast player and RSS reader."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  archive: 4.0.9
  audio_service: 0.18.19
  audio_session: 0.2.4
  # 9.5.6 has an upstream Android Kotlin compile regression (missing BDPlugin).
  background_downloader: 9.5.5
  connectivity_plus: 7.3.0
  crypto: 3.0.7
  cupertino_icons: 1.0.9
  dio: 5.10.0
  disk_space_plus: 0.2.6
  drift: 2.34.2
  file_selector: 1.1.0
  flutter_local_notifications: 22.0.1
  flutter_cache_manager: 3.4.1
  flutter_riverpod: 3.3.2
  flutter_secure_storage: 10.3.1
  go_router: 17.3.0
  html: 0.15.6
  intl: 0.20.3
  just_audio: 0.10.6
  package_info_plus: 10.2.1
  path: 1.9.1
  path_provider: 2.1.6
  share_plus: 13.2.1
  url_launcher: 6.3.2
  uuid: 4.6.0
  workmanager: 0.9.0+3
  xml: 7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: 2.11.1
  drift_dev: 2.34.0
  flutter_lints: 6.0.0

flutter:
  config:
    # CocoaPods is required by three plugins. Using one dependency manager
    # avoids duplicate registration and deployment-target drift in Xcode.
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/fonts/OFL-ChakraPetch.txt
    - assets/fonts/OFL-SpaceGrotesk.txt
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-400.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-500.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-600.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-700.ttf
          weight: 700
    - family: ChakraPetch
      fonts:
        - asset: assets/fonts/ChakraPetch-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ChakraPetch-Bold.ttf
          weight: 700
