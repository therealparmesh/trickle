appId: com.parmscript.trickle
---
- launchApp:
    clearState: false
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Back"
    optional: true
- assertVisible: ".*The Joe Rogan Experience.*"
- takeScreenshot: "store/apple/screenshots/01-home"
- tapOn: "Podcast The Joe Rogan Experience. Joe Rogan"
- assertVisible: ".*The Joe Rogan Experience.*"
- takeScreenshot: "store/apple/screenshots/02-podcast"
- tapOn: ".*Played episode #2527 - MrBeast.*"
- assertVisible: ".*#2527 - MrBeast.*"
- takeScreenshot: "store/apple/screenshots/03-episode"
- tapOn: "Back"
- tapOn: "Back"
- tapOn:
    text: "See all"
    index: 1
- assertVisible: "Unread"
- takeScreenshot: "store/apple/screenshots/04-unread"
- tapOn: "Feeds"
- tapOn: "Hacker News: Front Page"
- tapOn: "Unread article .*"
- assertVisible: ".*Hacker News: Front Page.*"
- swipe:
    start: "50%,20%"
    end: "50%,90%"
    duration: 500
- swipe:
    start: "50%,20%"
    end: "50%,90%"
    duration: 500
- assertVisible: ".*Hacker News: Front Page.*"
- takeScreenshot: "store/apple/screenshots/05-reader"
